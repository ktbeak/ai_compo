<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 모차르트 주사위 작곡가</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tone.js CDN for Audio -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto+Sans+KR', sans-serif;
            /* 부드러운 연두색 배경 */
            background-color: #eaf5e1; 
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* 3D Dice Styles */
        .dice-container {
            perspective: 600px;
            width: 42px;
            height: 42px;
        }
        .dice {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            /* 부드럽게 감속하는 역동적인 회전을 위해 transition 속성 수정 (3초 길이, 감속 곡선 적용) */
            transition: transform 3s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        .dice-face {
            position: absolute;
            width: 42px;
            height: 42px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            backface-visibility: hidden;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.05);
        }
        .dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; } /* 주사위 점 기본 빨간색으로 통일 */

        /* Dice Face Rotations */
        .face-1 { transform: rotateY(0deg) translateZ(21px); }
        .face-2 { transform: rotateY(90deg) translateZ(21px); }
        .face-3 { transform: rotateX(90deg) translateZ(21px); }
        .face-4 { transform: rotateX(-90deg) translateZ(21px); }
        .face-5 { transform: rotateY(-90deg) translateZ(21px); }
        .face-6 { transform: rotateX(180deg) translateZ(21px); }

        /* Drag and Drop Visuals */
        .dragging { opacity: 0.5; transform: scale(0.95); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-x-auto">
    
    <!-- 전체 레이아웃 컨테이너 (최소 너비 보장하여 레이아웃 유지) -->
    <div class="min-w-[1100px] h-full flex flex-col p-4 md:p-6 mx-auto w-full max-w-[1600px]">
        
        <!-- 상단 헤더 -->
        <header class="text-center mb-6 shrink-0">
            <h1 class="text-2xl font-black text-green-800 flex items-center justify-center gap-2">
                🎵 AI 모차르트 주사위 작곡가
            </h1>
        </header>

        <!-- 메인 컨텐츠 영역 (좌측/중앙/우측) -->
        <div class="flex-grow flex gap-4 min-h-0">
            
            <!-- 좌측: 컨트롤 및 주사위 (고정 너비) -->
            <!-- 이 부분의 클래스에 justify-center를 추가하고 내부 래퍼를 제거하여 전체 요소가 중앙에 오도록 수정합니다. -->
            <div class="w-[260px] flex flex-col justify-center gap-4 shrink-0">
                
                <!-- 1. 정보 및 현재 위치 -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 shrink-0">
                    <div class="flex items-start gap-2 mb-4">
                        <i data-lucide="info" class="w-4 h-4 text-blue-500 mt-0.5 shrink-0"></i>
                        <span id="message-text" class="text-sm font-bold text-slate-700 leading-tight">주사위를 굴려 시작하세요!</span>
                    </div>
                    <div class="flex justify-between items-center bg-[#f0faeb] px-4 py-2.5 rounded-xl">
                        <span class="text-xs font-bold text-green-600">현재 위치</span>
                        <span id="pos-display" class="font-black text-green-800">출발</span>
                    </div>
                </div>

                <!-- 2. 주사위 영역 -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col items-center justify-center min-h-[280px]">
                    <div class="flex gap-4 mb-8" id="dice-wrapper">
                        <!-- 주사위 3개가 자바스크립트로 생성됩니다 -->
                    </div>
                    <button id="roll-btn" class="w-full py-3.5 rounded-xl font-bold text-white shadow-md transition-all active:scale-95 bg-[#22c55e] hover:bg-green-500 flex items-center justify-center gap-2">
                        <i data-lucide="dice-5" class="w-5 h-5"></i>
                        <span id="roll-btn-text">주사위 굴리기</span>
                    </button>
                </div>

                <!-- 3. 하단 컨트롤 -->
                <div class="bg-white rounded-[1.25rem] shadow-sm border border-slate-100 p-4 shrink-0 space-y-3">
                    <button id="play-full-btn" disabled class="w-full py-4 rounded-xl font-bold text-white flex items-center justify-center gap-2 transition-all bg-[#e2e8f0] cursor-not-allowed text-[15px]">
                        <i data-lucide="play" class="w-5 h-5"></i> 곡 연주하기
                    </button>
                    <button id="reset-btn" class="w-full py-4 flex justify-center items-center gap-2 text-slate-600 bg-[#f8fafc] hover:bg-slate-100 rounded-xl transition-colors font-bold text-[15px]">
                        <i data-lucide="rotate-ccw" class="w-5 h-5"></i> 다시 시작
                    </button>
                </div>
                
            </div>

            <!-- 중앙: 보드판 (남은 공간 모두 차지) -->
            <div class="flex-grow bg-[#dff3ce] rounded-3xl shadow-inner overflow-hidden relative border-4 border-white/50">
                <img src="https://raw.githubusercontent.com/ktbeak/2026_class01/main/AI%20%EB%AA%A8%EC%B0%A8%EB%A5%B4%ED%8A%B8%20%EC%A3%BC%EC%82%AC%EC%9C%84%20%EC%9E%91%EA%B3%A1%EA%B0%80_02.png" 
                     class="absolute inset-0 w-full h-full object-contain" alt="보드판">
            </div>

            <!-- 우측: 오선보 리스트 (고정 너비) -->
            <div class="w-[300px] bg-white rounded-3xl shadow-sm border border-slate-100 flex flex-col overflow-hidden shrink-0">
                <div class="p-5 border-b border-slate-50 flex justify-between items-center">
                    <h2 class="font-black text-slate-800 flex items-center gap-2 text-lg">
                        <i data-lucide="music-4" class="w-5 h-5 text-indigo-500"></i> 나의 오선보
                    </h2>
                    <span id="measure-count" class="text-xs font-bold bg-blue-500 text-white px-2.5 py-1 rounded-full">0 / 8</span>
                </div>
                <div id="score-list" class="flex flex-col gap-3 p-4 overflow-y-auto flex-grow custom-scrollbar">
                    <!-- 빈 상태 안내 -->
                    <div class="h-full flex flex-col items-center justify-center text-slate-300 text-center p-4">
                        <i data-lucide="music" class="w-10 h-10 mb-3 opacity-20"></i>
                        <p class="text-sm font-medium">주사위를 굴려 마디를 채워보세요.<br><span class="text-xs font-normal mt-1 block">(드래그로 순서 변경 가능)</span></p>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <!-- 나만의 선율 만들기 모달 -->
    <div id="compose-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full border-4 border-yellow-300">
            <h2 class="text-2xl font-black text-slate-800 mb-2 flex items-center gap-2">
                <i data-lucide="star" class="w-6 h-6 text-yellow-500 fill-yellow-500"></i> 나만의 선율 만들기
            </h2>
            <p class="text-slate-600 mb-6 font-medium">별표(★) 칸의 4개 음을 선택해주세요!</p>
            <div class="flex justify-between gap-2 mb-8" id="compose-selects">
                <!-- Selects will be injected here -->
            </div>
            <button id="confirm-compose-btn" class="w-full py-4 bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-black rounded-2xl shadow-lg transition-colors text-lg">
                선율 완성하여 추가하기
            </button>
        </div>
    </div>

    <!-- 악기 선택 모달 -->
    <div id="instrument-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full border-4 border-blue-400">
            <h2 class="text-2xl font-black text-slate-800 mb-2 flex items-center gap-2">
                <i data-lucide="volume-2" class="w-6 h-6 text-blue-500"></i> 악기 선택
            </h2>
            <p class="text-slate-600 mb-6 font-medium">연주할 악기를 골라주세요.</p>
            <div class="grid grid-cols-2 gap-3 mb-8" id="instrument-options">
                <!-- Buttons injected here -->
            </div>
            <div class="flex gap-3">
                <button onclick="toggleModal('instrument-modal', false)" class="flex-1 py-4 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-2xl transition-colors">취소</button>
                <button id="start-playback-btn" class="flex-[2] py-4 bg-blue-600 hover:bg-blue-700 text-white font-black rounded-2xl shadow-lg transition-colors text-lg flex items-center justify-center gap-2">
                    <i data-lucide="play" class="w-5 h-5 fill-current"></i> 연주 시작
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- 데이터 및 상수 ---
        const MEASURE_DATA = {
            1: [{ note: 'C4', duration: '4n' }, { note: 'D4', duration: '4n' }, { note: 'E4', duration: '4n' }, { note: 'F4', duration: '4n' }],
            2: [{ note: 'C4', duration: '4n' }, { note: 'E4', duration: '4n' }, { note: 'G4', duration: '4n' }, { note: 'C5', duration: '4n' }],
            3: { type: 'COMPOSE' },
            4: [{ note: 'C5', duration: '2n' }, { note: 'B4', duration: '8n' }, { note: 'A4', duration: '8n' }, { note: 'G4', duration: '4n' }],
            5: [{ note: 'A4', duration: '4n' }, { note: 'G4', duration: '4n' }, { note: 'F4', duration: '4n' }, { note: 'E4', duration: '4n' }],
            6: [{ note: 'G4', duration: '8n' }, { note: 'A4', duration: '8n' }, { note: 'B4', duration: '8n' }, { note: 'C5', duration: '8n' }, { note: 'C5', duration: '4n' }, { note: 'G4', duration: '4n' }],
            7: { type: 'ACCIDENTAL' },
            8: [{ note: 'E4', duration: '2n' }, { note: 'G4', duration: '4n' }, { note: 'F4', duration: '4n' }],
            9: { type: 'COMPOSE' },
            10: [{ note: 'E4', duration: '4n' }, { note: 'G4', duration: '4n' }, { note: 'C5', duration: '4n' }, { note: 'G4', duration: '4n' }],
            11: [{ note: 'C5', duration: '2n.' }, { note: 'G4', duration: '4n' }],
            12: { type: 'SKIP' },
            13: [{ note: 'C5', duration: '2n' }, { note: 'G4', duration: '4n' }, { note: 'E4', duration: '4n' }],
            14: { type: 'COMPOSE' },
            15: [{ note: 'C5', duration: '2n' }, { note: 'G4', duration: '2n' }],
            16: { type: 'COMPOSE' },
            17: [{ note: 'A4', duration: '2n' }, { note: 'C5', duration: '2n' }],
            18: [{ note: 'F4', duration: '4n' }, { note: 'A4', duration: '4n' }, { note: 'G4', duration: '8n' }, { note: 'F4', duration: '8n' }, { note: 'E4', duration: '4n' }],
            19: [{ note: 'G4', duration: '8n' }, { note: 'A4', duration: '8n' }, { note: 'G4', duration: '8n' }, { note: 'F4', duration: '8n' }, { note: 'E4', duration: '2n' }],
            20: { type: 'GO_BACK', target: 15 },
            21: { type: 'COMPOSE' },
            22: [{ note: 'F4', duration: '4n' }, { note: 'A4', duration: '4n' }, { note: 'C5', duration: '4n' }, { note: 'A4', duration: '4n' }],
            23: [{ note: 'C5', duration: '4n' }, { note: 'B4', duration: '8n' }, { note: 'A4', duration: '8n' }, { note: 'G4', duration: '4n' }, { note: 'F4', duration: '4n' }],
            24: [{ note: 'E4', duration: '4n' }, { note: 'G4', duration: '4n' }, { note: 'REST', duration: '4n' }, { note: 'REST', duration: '4n' }],
            25: [{ note: 'G4', duration: '8n' }, { note: 'A4', duration: '8n' }, { note: 'G4', duration: '8n' }, { note: 'F4', duration: '8n' }, { note: 'E4', duration: '8n' }, { note: 'F4', duration: '8n' }, { note: 'G4', duration: '4n' }],
            26: { type: 'COMPOSE' },
            27: [{ note: 'A4', duration: '4n' }, { note: 'F4', duration: '4n' }, { note: 'G4', duration: '4n' }, { note: 'E4', duration: '4n' }],
            28: { type: 'GO_BACK', target: 8 },
            29: [{ note: 'D4', duration: '4n' }, { note: 'F4', duration: '4n' }, { note: 'E4', duration: '4n' }, { note: 'C4', duration: '4n' }],
        };

        const NOTE_TO_KO = { 'C4': '도', 'D4': '레', 'E4': '미', 'F4': '파', 'G4': '솔', 'A4': '라', 'B4': '시', 'C5': '높은 도', 'REST': '쉼표' };
        const INSTRUMENTS = {
            piano: { name: '피아노', synthType: Tone.Synth, options: { oscillator: { type: "triangle" }, envelope: { attack: 0.005, decay: 0.1, sustain: 0.3, release: 1 } } },
            flute: { name: '플루트', synthType: Tone.Synth, options: { oscillator: { type: "sine" }, envelope: { attack: 0.1, decay: 0.1, sustain: 1, release: 0.5 } } },
            organ: { name: '오르간', synthType: Tone.FMSynth, options: { harmonicity: 2, modulationIndex: 3, envelope: { attack: 0.01, decay: 0.1, sustain: 0.9, release: 0.5 } } },
            synth: { name: '신디사이저', synthType: Tone.AMSynth, options: { harmonicity: 2.5, oscillator: { type: "square" }, envelope: { attack: 0.01, decay: 0.2, sustain: 0.2, release: 1 } } },
            brass: { name: '브라스', synthType: Tone.Synth, options: { oscillator: { type: "sawtooth" }, envelope: { attack: 0.05, decay: 0.2, sustain: 0.6, release: 0.5 } } }
        };

        // --- 앱 상태 ---
        let currentPosition = 0;
        let composedMeasures = [];
        let isRolling = false;
        let skipTurn = false;
        let selectedInstrument = 'piano';
        let isPlaying = false;
        let synth = null;
        let diceSynth = null;
        let composeCount = 0; // 나만의 선율 만들기 진행 횟수 추적
        // 주사위의 누적 회전값을 저장하여 항상 앞으로 굴러가도록 처리
        let currentRotations = [{x:0, y:0}, {x:0, y:0}, {x:0, y:0}];

        // --- 초기화 ---
        function init() {
            lucide.createIcons();
            createDice();
            createInstrumentButtons();
            createComposeSelects();
            updateSynth();
            initDiceSynth();
            
            document.getElementById('roll-btn').addEventListener('click', rollDice);
            document.getElementById('play-full-btn').addEventListener('click', () => toggleModal('instrument-modal', true));
            document.getElementById('start-playback-btn').addEventListener('click', playFullSong);
            document.getElementById('confirm-compose-btn').addEventListener('click', submitCustomMeasure);
            document.getElementById('reset-btn').addEventListener('click', resetGame);
        }

        function createDice() {
            const wrapper = document.getElementById('dice-wrapper');
            for(let i=0; i<3; i++) {
                const container = document.createElement('div');
                container.className = 'dice-container';
                container.innerHTML = `
                    <div class="dice" id="dice-${i}">
                        <div class="dice-face face-1"><div class="dot"></div></div>
                        <div class="dice-face face-2"><div class="dot"></div><div class="dot" style="position:absolute; bottom:8px; right:8px;"></div></div>
                        <div class="dice-face face-3"><div class="dot" style="position:absolute; top:8px; left:8px;"></div><div class="dot"></div><div class="dot" style="position:absolute; bottom:8px; right:8px;"></div></div>
                        <div class="dice-face face-4"><div class="flex flex-col justify-between h-full p-2 w-full"><div class="flex justify-between"><div class="dot"></div><div class="dot"></div></div><div class="flex justify-between"><div class="dot"></div><div class="dot"></div></div></div></div>
                        <div class="dice-face face-5"><div class="flex flex-col justify-between h-full p-2 w-full"><div class="flex justify-between"><div class="dot"></div><div class="dot"></div></div><div class="dot self-center"></div><div class="flex justify-between"><div class="dot"></div><div class="dot"></div></div></div></div>
                        <div class="dice-face face-6"><div class="flex flex-col justify-between h-full p-2 w-full"><div class="flex justify-between"><div class="dot"></div><div class="dot"></div></div><div class="flex justify-between"><div class="dot"></div><div class="dot"></div></div><div class="flex justify-between"><div class="dot"></div><div class="dot"></div></div></div></div>
                    </div>
                `;
                wrapper.appendChild(container);
            }
        }

        function createInstrumentButtons() {
            const container = document.getElementById('instrument-options');
            container.innerHTML = '';
            Object.entries(INSTRUMENTS).forEach(([key, inst]) => {
                const btn = document.createElement('button');
                btn.id = `inst-${key}`;
                btn.className = `py-3 px-4 rounded-xl text-sm font-bold border-2 transition-all flex items-center justify-center gap-2 ${selectedInstrument === key ? 'bg-blue-50 border-blue-500 text-blue-700' : 'bg-white border-slate-200'}`;
                btn.innerText = inst.name;
                btn.onclick = () => {
                    selectedInstrument = key;
                    updateSynth();
                    createInstrumentButtons(); // refresh styles
                };
                container.appendChild(btn);
            });
        }

        function createComposeSelects() {
            const container = document.getElementById('compose-selects');
            container.innerHTML = '';
            for(let i=0; i<4; i++) {
                const div = document.createElement('div');
                div.className = 'flex flex-col items-center gap-2 w-full';
                div.innerHTML = `
                    <span class="text-xs font-bold text-slate-400">${i+1}박</span>
                    <select class="compose-note w-full p-2 border-2 border-slate-200 rounded-xl font-bold text-slate-700 text-sm bg-white outline-none">
                        ${Object.entries(NOTE_TO_KO).map(([k,v]) => `<option value="${k}">${v}</option>`).join('')}
                    </select>
                `;
                container.appendChild(div);
            }
        }

        function updateSynth() {
            if(synth) synth.dispose();
            const inst = INSTRUMENTS[selectedInstrument];
            synth = new Tone.PolySynth(inst.synthType, inst.options).toDestination();
            Tone.Destination.volume.value = -5; // 약간 소리 줄임
        }

        function initDiceSynth() {
            // 플라스틱 주사위가 부딪히는 듯한 짧고 타격감 있는 소리 설정
            diceSynth = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: "square" },
                envelope: { attack: 0.001, decay: 0.05, sustain: 0, release: 0.01 }
            }).toDestination();
            diceSynth.volume.value = -22; // 기존 -12에서 -22로 볼륨 대폭 감소
        }

        function startDiceSound() {
            if(!diceSynth) initDiceSynth();
            let clickCount = 0;
            let timeBetweenClicks = 50; // 초기 클릭 간격 (빠르게)
            
            function playClick() {
                if(!isRolling) return; // 굴러가는 상태가 끝나면 소리도 종료
                
                // 약간씩 다른 음높이로 부딪히는 느낌 연출
                const notes = ["C5", "C#5", "D5", "D#5", "E5"];
                const randomNote = notes[Math.floor(Math.random() * notes.length)];
                diceSynth.triggerAttackRelease(randomNote, "32n");
                
                clickCount++;
                timeBetweenClicks += 3; // 굴러갈수록 점점 느려지는 효과
                
                setTimeout(playClick, timeBetweenClicks);
            }
            playClick();
        }

        function toggleModal(id, show) {
            document.getElementById(id).style.display = show ? 'flex' : 'none';
        }

        // --- 핵심 로직 ---
        async function rollDice() {
            if(isRolling || composedMeasures.length >= 8) return;
            
            // 사용자의 첫 상호작용시 Tone.js AudioContext 시작
            await Tone.start();

            if(skipTurn) {
                setMessage("이번 차례는 쉽니다.");
                skipTurn = false;
                return;
            }

            isRolling = true;
            startDiceSound(); // 주사위 굴러가는 효과음 시작

            const results = [Math.floor(Math.random()*6)+1, Math.floor(Math.random()*6)+1, Math.floor(Math.random()*6)+1];
            
            results.forEach((val, i) => {
                const dice = document.getElementById(`dice-${i}`);
                let targetRx=0, targetRy=0;
                switch(val) {
                    case 1: targetRx=0; targetRy=0; break;
                    case 2: targetRx=0; targetRy=-90; break;
                    case 3: targetRx=-90; targetRy=0; break;
                    case 4: targetRx=90; targetRy=0; break;
                    case 5: targetRx=0; targetRy=90; break;
                    case 6: targetRx=180; targetRy=0; break;
                }
                
                // 역동적인 회전을 위해 최소 5바퀴 ~ 최대 9바퀴의 무작위 추가 회전을 부여
                const extraSpinsX = 5 + Math.floor(Math.random() * 5);
                const extraSpinsY = 5 + Math.floor(Math.random() * 5);
                
                // 현재까지의 누적 회전값에 더하여 계속 한 방향으로 구르는 느낌 제공
                currentRotations[i].x += 360 * extraSpinsX;
                currentRotations[i].y += 360 * extraSpinsY;
                
                // 최종 도달할 X/Y 축 각도
                const finalRx = currentRotations[i].x + targetRx;
                const finalRy = currentRotations[i].y + targetRy;
                
                dice.style.transform = `rotateX(${finalRx}deg) rotateY(${finalRy}deg)`;
            });

            setTimeout(() => {
                isRolling = false;
                const sum = results.reduce((a,b)=>a+b, 0);
                let nextPos = currentPosition + sum;
                if(nextPos > 29) {
                    nextPos -= 29;
                    setMessage(`한 바퀴 돌아 ${sum}칸 이동!`);
                } else {
                    setMessage(`${sum}칸 이동합니다!`);
                }
                currentPosition = nextPos;
                document.getElementById('pos-display').innerText = currentPosition + "번";
                handleArrival(currentPosition);
            }, 3000); // 늘어난 회전 애니메이션 시간(3초)에 맞춰 타이머 수정
        }

        function handleArrival(cell) {
            let data = MEASURE_DATA[cell];
            if(!data) {
                setMessage("빈 칸입니다.");
                return;
            }

            // --- 나만의 선율 만들기 최소 2회 보장 로직 ---
            const remainingSlots = 8 - composedMeasures.length;
            const remainingComposesNeeded = 2 - composeCount;

            // 일반 마디(Array)에 도착했을 때, 남은 칸 수 대비 작곡해야 할 횟수가 부족하면 강제로 COMPOSE(별표) 칸으로 변경합니다.
            if (Array.isArray(data) && remainingSlots <= remainingComposesNeeded) {
                data = { type: 'COMPOSE' };
            }

            if(Array.isArray(data)) {
                addMeasure(data);
                playMeasure(data);
                setMessage(`${cell}번 마디 수집 완료!`);
            } else {
                switch(data.type) {
                    case 'GO_BACK':
                        setTimeout(() => {
                            currentPosition = data.target;
                            document.getElementById('pos-display').innerText = currentPosition + "번";
                            setMessage(`${data.target}번으로 돌아갑니다!`);
                            if(Array.isArray(MEASURE_DATA[data.target])) {
                                addMeasure(MEASURE_DATA[data.target]);
                                playMeasure(MEASURE_DATA[data.target]);
                            }
                        }, 1000);
                        break;
                    case 'SKIP':
                        skipTurn = true;
                        setMessage("앗! 다음 차례는 쉽니다.");
                        break;
                    case 'COMPOSE':
                        setMessage("별표 칸! 선율을 직접 만드세요.");
                        toggleModal('compose-modal', true);
                        break;
                    case 'ACCIDENTAL':
                        setMessage("임시표 칸! (기능 준비중)");
                        break;
                }
            }
        }

        function addMeasure(m) {
            if(composedMeasures.length >= 8) return;
            composedMeasures.push(m);
            renderScore();
        }

        function submitCustomMeasure() {
            const selects = document.querySelectorAll('.compose-note');
            const measure = Array.from(selects).map(s => ({ note: s.value, duration: '4n' }));
            addMeasure(measure);
            playMeasure(measure);
            composeCount++; // 선율 만들기 완료 시 횟수 1 증가
            toggleModal('compose-modal', false);
        }

        async function playMeasure(measure) {
            await Tone.start();
            let time = Tone.now();
            measure.forEach(obj => {
                if(obj.note !== 'REST') {
                    synth.triggerAttackRelease(obj.note, obj.duration, time);
                }
                time += Tone.Time(obj.duration).toSeconds();
            });
        }

        async function playFullSong() {
            toggleModal('instrument-modal', false);
            if(isPlaying || composedMeasures.length === 0) return;
            isPlaying = true;
            await Tone.start();
            
            let time = Tone.now() + 0.1; // 약간의 딜레이 후 시작
            composedMeasures.forEach(m => {
                m.forEach(obj => {
                    if(obj.note !== 'REST') {
                        synth.triggerAttackRelease(obj.note, obj.duration, time);
                    }
                    time += Tone.Time(obj.duration).toSeconds();
                });
            });
            setTimeout(() => isPlaying = false, (time - Tone.now()) * 1000);
        }

        function renderScore() {
            const list = document.getElementById('score-list');
            list.innerHTML = '';
            document.getElementById('measure-count').innerText = `${composedMeasures.length} / 8`;
            
            if(composedMeasures.length >= 8) {
                const btn = document.getElementById('play-full-btn');
                btn.disabled = false;
                btn.className = "w-full py-4 rounded-xl font-bold text-white flex items-center justify-center gap-2 transition-all bg-blue-500 hover:bg-blue-600 shadow-md transform hover:scale-[1.02] active:scale-[0.98] text-[15px]";
            }

            composedMeasures.forEach((m, idx) => {
                const div = document.createElement('div');
                div.className = "bg-slate-50 p-3 rounded-2xl border border-slate-200 flex flex-col gap-2 shrink-0 cursor-grab active:cursor-grabbing hover:border-blue-300 hover:bg-blue-50/50 transition-colors shadow-sm";
                div.draggable = true;
                div.dataset.index = idx;
                
                div.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <i data-lucide="grip-vertical" class="w-4 h-4 text-slate-400"></i>
                            <span class="w-5 h-5 bg-indigo-500 text-white rounded-full flex items-center justify-center text-[10px] font-bold">${idx+1}</span>
                        </div>
                        <button class="p-1 bg-white rounded-full border border-slate-200 hover:bg-indigo-50 transition-colors" onclick="event.stopPropagation(); playOne(${idx})">
                            <i data-lucide="play" class="w-3 h-3 fill-current text-indigo-500"></i>
                        </button>
                    </div>
                    <div class="flex justify-between items-center bg-white px-2 py-1.5 rounded-lg border border-slate-100">
                        ${m.map(n => `<span class="text-xs font-bold ${n.note === 'REST' ? 'text-slate-300' : 'text-slate-700'}">${NOTE_TO_KO[n.note]}</span>`).join('')}
                    </div>
                `;

                // Drag and Drop Events
                div.addEventListener('dragstart', () => div.classList.add('dragging'));
                div.addEventListener('dragend', () => {
                    div.classList.remove('dragging');
                    reorderMeasures();
                });

                list.appendChild(div);
            });
            lucide.createIcons();

            // 리스트 드래그 오버 로직 적용
            list.addEventListener('dragover', e => {
                e.preventDefault();
                const afterElement = getDragAfterElement(list, e.clientY);
                const dragging = document.querySelector('.dragging');
                if(dragging) {
                    if (afterElement == null) {
                        list.appendChild(dragging);
                    } else {
                        list.insertBefore(dragging, afterElement);
                    }
                }
            });
        }

        function playOne(idx) {
            playMeasure(composedMeasures[idx]);
        }

        function reorderMeasures() {
            const items = document.querySelectorAll('#score-list > div');
            const newOrder = [];
            items.forEach(item => {
                if(item.dataset.index !== undefined) {
                    newOrder.push(composedMeasures[parseInt(item.dataset.index)]);
                }
            });
            composedMeasures = newOrder;
            renderScore(); // 데이터 인덱스 재정렬을 위해 다시 렌더링
        }

        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('[draggable]:not(.dragging)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        function setMessage(msg) {
            document.getElementById('message-text').innerText = msg;
        }

        function resetGame() {
            currentPosition = 0;
            composedMeasures = [];
            composeCount = 0; // 초기화 시 작곡 횟수도 0으로 되돌리기
            skipTurn = false;
            document.getElementById('pos-display').innerText = "출발";
            document.getElementById('score-list').innerHTML = `
                <div class="h-full flex flex-col items-center justify-center text-slate-300 text-center p-4">
                    <i data-lucide="music" class="w-10 h-10 mb-3 opacity-20"></i>
                    <p class="text-sm font-medium">주사위를 굴려 마디를 채워보세요.<br><span class="text-xs font-normal mt-1 block">(드래그로 순서 변경 가능)</span></p>
                </div>
            `;
            document.getElementById('measure-count').innerText = "0 / 8";
            setMessage("새로운 작곡을 시작합니다!");
            const btn = document.getElementById('play-full-btn');
            btn.disabled = true;
            btn.className = "w-full py-4 rounded-xl font-bold text-white flex items-center justify-center gap-2 transition-all bg-[#e2e8f0] cursor-not-allowed text-[15px]";
        }

        window.onload = init;
    </script>
</body>
</html>
